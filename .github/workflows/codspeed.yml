name: codspeed-benchmarks

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"
    paths:
      - "src/**"
      - "benches/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/**"
      - ".github/workflows/codspeed.yml"
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

permissions:
  contents: read

env:
  # Keep benchmark identities identical on PR and master runs so CodSpeed can compare them.
  KIDDO_BENCH_LOG2_POINTS: "16"

jobs:
  simulation_benchmarks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC authentication with CodSpeed
    steps:
      - uses: actions/checkout@v7

      - name: Setup rust toolchain, cache and cargo-codspeed binary
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Build Benchmark Targets (Simulation)
        run: cargo codspeed build -m simulation

      - name: Run Benchmarks (Simulation)
        uses: CodSpeedHQ/action@v4
        with:
          run: cargo codspeed run
          mode: simulation
