name: Coverage

on:
  push:
    branches:
      - master
      - v5.x.x
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-feature=+avx2"

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
          fetch-depth: 1

      - name: Detect source changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          # First push to a branch can have an empty/zero before SHA; run coverage in that case.
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "coverage=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$base_sha"
          fi

          if ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$head_sha"
          fi

          if git diff --name-only "$base_sha" "$head_sha" -- 'src/**' 'tests/**' | grep -q .; then
            echo "coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get date
        if: steps.changes.outputs.coverage == 'true'
        run: |
          echo "TODAY_DATE=$(date -Idate)" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        if: steps.changes.outputs.coverage == 'true'
        uses: actions/cache@v6
        with:
          path: ~/.rustup
          key: toolchain-x86-64-nightly-${{ env.TODAY_DATE }}

      - name: Install `nightly` Toolchain
        if: steps.changes.outputs.coverage == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt,clippy,llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: steps.changes.outputs.coverage == 'true'
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-llvm-cov

      - name: Generate Coverage
        if: steps.changes.outputs.coverage == 'true'
        run: |
          cargo run --example build-immutable-doctest-tree-rkyv_08 --features="rkyv_08"
          cargo llvm-cov --features "csv,las,serde,simd,rkyv_08,test_utils" --tests --ignore-run-fail --workspace --codecov --output-path codecov.json

      - name: Skip coverage
        if: steps.changes.outputs.coverage != 'true'
        run: echo "No changes under src/** or tests/**; skipping coverage generation."

      - uses: codecov/codecov-action@v7
        if: steps.changes.outputs.coverage == 'true'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
