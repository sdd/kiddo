name: CI / Nightly

on:
  push:
    branches:
      - master
      - v5.x.x
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-nightly:
    name: Lint (Nightly)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      RUSTFLAGS: "-C target-feature=+avx2"

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Get date
        run: |
          echo "TODAY_DATE=$(date -Idate)" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: toolchain-x86-64-nightly-${{ env.TODAY_DATE }}

      - name: Install `nightly` Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Clippy (Nightly)
        uses: LoliGothick/clippy-check@9019e9494e188cc9fddfea43467e7fdf6602ad14
        if: github.actor != 'dependabot[bot]'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          options: --features fixed,rkyv_08,serde --no-deps
          name: Clippy nightly

      - name: Clippy (Nightly)
        if: github.actor == 'dependabot[bot]'
        run: cargo clippy --features fixed,rkyv_08,serde --no-deps

      - name: Install cargo-hack
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-hack
          version: "^0.6"

      - name: Cargo Hack (check all targets and features)
        run: cargo hack check --workspace --each-feature --all-targets

  test-nightly:
    name: Test (Nightly)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      RUSTFLAGS: "-C target-feature=+avx2"
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Get date
        run: |
          echo "TODAY_DATE=$(date -Idate)" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: toolchain-x86-64-nightly-${{ env.TODAY_DATE }}

      - name: Install `nightly` Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cargo nextest (dev build)
        run: |
          cargo run --example build-float-doctest-tree-rkyv_08 --features="rkyv_08"
          cargo run --example build-immutable-doctest-tree-rkyv_08 --features="rkyv_08"
          cargo nextest run --workspace --features "csv,f16,las,serde,simd,rkyv_08,test_utils"

      - name: Cargo nextest (release build)
        run: |
          cargo nextest run --workspace --features "csv,f16,las,serde,simd,rkyv_08,test_utils" --release

      - name: Cargo test (Doctests)
        run: |
          cargo test --workspace --doc --features "csv,f16,las,serde,simd,rkyv_08,test_utils"
