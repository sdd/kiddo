name: CI / Nightly

on:
  push:
    branches:
      - master
      - v5.x.x
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-nightly:
    name: Lint (Nightly)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      RUSTFLAGS: "-C target-feature=+avx2"

    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Get date
        run: |
          echo "TODAY_DATE=$(date -Idate)" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        uses: actions/cache@v6
        with:
          path: ~/.rustup
          key: toolchain-x86-64-nightly-${{ env.TODAY_DATE }}

      - name: Install `nightly` Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Clippy (Nightly)
        uses: LoliGothick/clippy-check@9eb49941357589c2e182d9796db08c67eea25042
        if: github.actor != 'dependabot[bot]'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          options: --features tracing,fixed,rkyv,rkyv_08,serde --no-deps
          name: Clippy nightly

      - name: Clippy (Nightly, dependabot fallback)
        if: github.actor == 'dependabot[bot]'
        run: cargo clippy --features tracing,fixed,rkyv,rkyv_08,serde --no-deps

      - name: Install cargo-hack
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-hack
          version: "^0.6"

      - name: Cargo Hack (check all targets and features)
        run: cargo hack check --workspace --each-feature --all-targets

  test-nightly-debug:
    name: Test (Nightly / Debug)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      CARGO_TARGET_DIR: target/nightly-debug
      RUSTFLAGS: "-C target-feature=+avx2"
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Get date
        run: |
          echo "TODAY_DATE=$(date -Idate)" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        uses: actions/cache@v6
        with:
          path: ~/.rustup
          key: toolchain-x86-64-nightly-${{ env.TODAY_DATE }}

      - name: Cache Cargo target dir (Debug)
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_TARGET_DIR }}
          key: nightly-target-${{ runner.os }}-${{ env.TODAY_DATE }}-debug-${{ hashFiles('Cargo.lock', '.github/workflows/build-nightly.yml') }}
          restore-keys: |
            nightly-target-${{ runner.os }}-${{ env.TODAY_DATE }}-debug-

      - name: Install `nightly` Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Prepare example artifacts
        run: |
          cargo run --example build-float-doctest-tree --features="rkyv"
          cargo run --example build-immutable-doctest-tree --features="rkyv"
          cargo run --example build-float-doctest-tree-rkyv_08 --features="rkyv_08"
          cargo run --example build-immutable-doctest-tree-rkyv_08 --features="rkyv_08"

      - name: Cargo nextest (dev build)
        run: |
          cargo nextest run --workspace --features "csv,f16,las,serde,simd,rkyv,rkyv_08,test_utils,tracing"

      - name: Cargo test (Doctests)
        run: |
          cargo test --workspace --doc --features "csv,f16,las,serde,simd,rkyv,rkyv_08,test_utils,tracing"

  test-nightly-release:
    name: Test (Nightly / Release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      CARGO_TARGET_DIR: target/nightly-release
      RUSTFLAGS: "-C target-feature=+avx2"
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Get date
        run: |
          echo "TODAY_DATE=$(date -Idate)" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        uses: actions/cache@v6
        with:
          path: ~/.rustup
          key: toolchain-x86-64-nightly-${{ env.TODAY_DATE }}

      - name: Cache Cargo target dir (Release)
        uses: actions/cache@v6
        with:
          path: ${{ env.CARGO_TARGET_DIR }}
          key: nightly-target-${{ runner.os }}-${{ env.TODAY_DATE }}-release-${{ hashFiles('Cargo.lock', '.github/workflows/build-nightly.yml') }}
          restore-keys: |
            nightly-target-${{ runner.os }}-${{ env.TODAY_DATE }}-release-

      - name: Install `nightly` Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Prepare example artifacts
        run: |
          cargo run --example build-float-doctest-tree --features="rkyv"
          cargo run --example build-immutable-doctest-tree --features="rkyv"
          cargo run --example build-float-doctest-tree-rkyv_08 --features="rkyv_08"
          cargo run --example build-immutable-doctest-tree-rkyv_08 --features="rkyv_08"

      - name: Cargo nextest (release build)
        run: |
          cargo nextest run --workspace --features "csv,f16,las,serde,simd,rkyv,rkyv_08,test_utils,tracing" --release

  test-nightly:
    name: Test (Nightly)
    runs-on: ubuntu-latest
    needs:
      - test-nightly-debug
      - test-nightly-release
    steps:
      - name: Nightly tests complete
        run: echo "Debug and release nightly test jobs passed."
