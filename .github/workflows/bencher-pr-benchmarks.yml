env:
  LATEST_STABLE_RUST_VERSION: "TBD"

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      head_sha:
        description: "Head commit SHA to benchmark"
        required: true
        type: string
      head_ref:
        description: "Head branch name"
        required: true
        type: string
      head_repo:
        description: "Head repository full name"
        required: true
        type: string
      base_ref:
        description: "Base branch name"
        required: true
        type: string
      base_sha:
        description: "Base commit SHA"
        required: true
        type: string

jobs:
  benchmark_pr_branch:
    name: Continuous Benchmarking PRs with Bencher
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        (
          github.event.pull_request.head.repo.full_name == github.repository ||
          github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'COLLABORATOR'
        )
      )
    permissions:
      contents: read
      checks: write
      pull-requests: write
    runs-on: [self-hosted]
    steps:
      - id: target
        name: Resolve benchmark target
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}
          INPUT_HEAD_REF: ${{ inputs.head_ref }}
          INPUT_HEAD_REPO: ${{ inputs.head_repo }}
          INPUT_BASE_REF: ${{ inputs.base_ref }}
          INPUT_BASE_SHA: ${{ inputs.base_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            pr_number="$INPUT_PR_NUMBER"
            head_sha="$INPUT_HEAD_SHA"
            head_ref="$INPUT_HEAD_REF"
            head_repo="$INPUT_HEAD_REPO"
            base_ref="$INPUT_BASE_REF"
            base_sha="$INPUT_BASE_SHA"
          else
            pr_number="$PR_NUMBER"
            head_sha="$PR_HEAD_SHA"
            head_ref="$PR_HEAD_REF"
            head_repo="$PR_HEAD_REPO"
            base_ref="$PR_BASE_REF"
            base_sha="$PR_BASE_SHA"
          fi

          {
            echo "pr_number=$pr_number"
            echo "head_sha=$head_sha"
            echo "head_ref=$head_ref"
            echo "head_repo=$head_repo"
            echo "base_ref=$base_ref"
            echo "base_sha=$base_sha"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          repository: ${{ steps.target.outputs.head_repo }}
          ref: ${{ steps.target.outputs.head_sha }}
          show-progress: false

      - name: Get latest stable Rust version
        run: |
          echo "LATEST_STABLE_RUST_VERSION=$(gh api /repos/rust-lang/rust/releases --jq ".[0].tag_name")" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        uses: actions/cache@v6
        with:
          path: ~/.rustup
          key: toolchain-x86-64-${{ env.LATEST_STABLE_RUST_VERSION }}

      - name: Install `stable` Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Ensure CMake is installed
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y cmake
          fi
          cmake --version

      - uses: bencherdev/bencher@main
      - name: Track PR Benchmarks with Bencher
        run: |
          bencher run \
          --project kiddo \
          --key '${{ secrets.BENCHER_API_KEY }}' \
          --branch '${{ steps.target.outputs.head_ref }}' \
          --start-point '${{ steps.target.outputs.base_ref }}' \
          --start-point-hash '${{ steps.target.outputs.base_sha }}' \
          --start-point-clone-thresholds \
          --start-point-reset \
          --testbed ubuntu-latest \
          --error-on-alert \
          --adapter rust_criterion \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          "cargo bench --bench profile_v6_nearest_one_eytzinger --bench profile_v6_nearest_n_eytzinger --features test_utils -- --noplot"
