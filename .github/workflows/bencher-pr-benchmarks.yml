env:
  LATEST_STABLE_RUST_VERSION: "TBD"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      head_sha:
        description: "Head commit SHA to benchmark"
        required: true
        type: string
      head_ref:
        description: "Head branch name"
        required: true
        type: string
      head_repo:
        description: "Head repository full name"
        required: true
        type: string
      base_ref:
        description: "Base branch name"
        required: true
        type: string
      base_sha:
        description: "Base commit SHA"
        required: true
        type: string

jobs:
  benchmark_pr_branch:
    name: Continuous Benchmarking PRs with Bencher
    permissions:
      contents: read
      checks: write
      pull-requests: write
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ inputs.head_repo }}
          ref: ${{ inputs.head_sha }}
          show-progress: false

      - name: Get latest stable Rust version
        run: |
          echo "LATEST_STABLE_RUST_VERSION=$(gh api /repos/rust-lang/rust/releases --jq ".[0].tag_name")" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Toolchain
        uses: actions/cache@v6
        with:
          path: ~/.rustup
          key: toolchain-x86-64-${{ env.LATEST_STABLE_RUST_VERSION }}

      - name: Install `stable` Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Ensure CMake is installed
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y cmake
          fi
          cmake --version

      - uses: bencherdev/bencher@main
      - name: Track PR Benchmarks with Bencher
        env:
          BENCH_HEAD_REF: ${{ inputs.head_ref }}
          BENCH_BASE_REF: ${{ inputs.base_ref }}
          BENCH_BASE_SHA: ${{ inputs.base_sha }}
        run: |
          bencher run \
          --project kiddo \
          --key '${{ secrets.BENCHER_API_KEY }}' \
          --branch "$BENCH_HEAD_REF" \
          --start-point "$BENCH_BASE_REF" \
          --start-point-hash "$BENCH_BASE_SHA" \
          --start-point-clone-thresholds \
          --start-point-reset \
          --testbed ubuntu-latest \
          --error-on-alert \
          --adapter rust_criterion \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          "cargo bench --bench profile_v6_nearest_one_eytzinger --bench profile_v6_nearest_n_eytzinger --features test_utils -- --noplot"
